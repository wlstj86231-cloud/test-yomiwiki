#:schema node_modules/wrangler/config-schema.json
name = "test-yomiwiki"
pages_build_output_dir = "public"
compatibility_date = "2024-03-17"

# --- [80. Environment Variable Separation] ---
# Note: For local development, configure D1 and R2 bindings via the Cloudflare Dashboard
# or by passing --d1 DB=<local-db-id> and --r2 ASSETS_BUCKET=<bucket> to `wrangler pages dev`.

# Production Environment Settings
[env.production]
[[env.production.d1_databases]]
binding = "DB"
database_name = "yomi-db-prod"
database_id = "d51a513c-fea7-458c-9c0e-b5f08f474689"

[[env.production.r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "yomi-assets-prod"

[vars]
ENVIRONMENT = "development"

[env.production.vars]
ENVIRONMENT = "production"
